<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form>
        <table align="center" cellspacing="3" cellpadding="5">
            <tr>
                <th colspan="2"><h1>Create Account</h1></th>
            </tr>
            <tr>
                <td><label for="Fn">First Name&nbsp;</label></td>
                <td><label for="Ln">Last Name</label></td>
            </tr>
            <tr>
                <td><input type="text" id="Fn" placeholder="enter your first name" required>&nbsp;</td>
                <td><input type="text" id="Ln" placeholder="enter your last name" required></td>
            </tr>
            <tr>
                <td><label for="Em">Email</label></td>
            </tr>
            <tr>
                <td><input type="text" id="Fn" placeholder="enter your Email" required></td>
            </tr>
            <tr>
                <td><label for="Ps">Password&nbsp;</label></td>
                <td><label for="Cps">Confirm Password</label></td>
            </tr>
            <tr>
                <td><input type="text" id="Ps" placeholder="enter your password" required>&nbsp;</td>
                <td><input type="text" id="Cps" placeholder="enter your password again" required></td>
            </tr>
            <tr>
                <td><label for="Ge">Gender&nbsp;</label></td>
                <td><label for="Ho">Hobbies</label></td>
            </tr>
            <tr>
                <td><input type="radio" id="Ge" value="Male">Male
                <input type="radio" id="Ge" value="Female">Female</td>

                <td><input type="checkbox" id="Ho" value="Music">Music
                <input type="checkbox" id="Ho" value="Sports">Sports
                <input type="checkbox" id="Ho" value="Travel">Travel
                <input type="checkbox" id="Ho" value="Movies">Movies</td>
            </tr>
            <tr>
                <td><label for="Soi">Source of Income&nbsp;</label></td>
                <td><label for="Ic">Income</label></td>
            </tr>
            <tr>
                <td></td>

                <td>0<input type="range" id="Ho" min="0" max="20000" step="1000" value="10000">20000</td>
            </tr>
        </table>
    </form>
</body>
</html>
