<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form>
        <table align="center" cellspacing="3" cellpadding="5">
            <h2 align="center">Employee Registration</h2>
            <tr>
                <th colspan="5"><h3 align="center">Personal Information</h3></th>
            </tr>
            <tr>
                <td><label for="Ei">Employee Id :&nbsp;</label></td>
                <td><input type="text" id="Ei" placeholder="enter Employee id" required></td>
                <td>&nbsp; &nbsp;</td>
                <td><label for="En">Employee Name :&nbsp;</label></td>
                <td><input type="text" id="En" placeholder="enter Employee name" required></td>
            </tr>
            <tr>
                <td><label for="Em">Email :&nbsp;</label></td>
                <td><input type="text" id="Em" placeholder="enter Email" required></td>
                <td>&nbsp; &nbsp;</td>
                <td><label for="En">Contact No. :&nbsp;</label></td>
                <td><input type="number" id="En" placeholder="enter contact number" required></td>
            </tr>
            <tr>
                <td><label for="Ms">Marital Status :&nbsp;</label></td>
                <td>
                <input type="radio" id="Ms" value="Single">Single
                <input type="radio" id="Ms" value="Married">Married
                </td>
            </tr>
            <tr>
                <th colspan="5"><h3 align="center">Education Qualification</h3></th>
            </tr>
            <tr>
                <td><label for="Ed">Education :&nbsp;</label></td>
                <td><input type="text" id="Ed" placeholder="enter Education details" required></td>
                <td>&nbsp; &nbsp;</td>
                <td><label for="Ex">Experience :&nbsp;</label></td>
                <td><input type="text" id="Ex" placeholder="enter Experience details" required></td>
            </tr>
            <tr>
                <th colspan="5"><h3 align="center">Job Details</h3></th>
            </tr>
            <tr>
                <td><label for="Ds">Designation :&nbsp;</label></td>
                <td><input type="text" id="Ds" placeholder="enter Designation details" required></td>
                <td>&nbsp; &nbsp;</td>
                <td><label for="Jl">Job Location :&nbsp;</label></td>
                <td><input type="text" id="Jl" placeholder="enter Job Location" required></td>
            </tr>
            <tr>
                <td><label for="Sl">Salary :&nbsp;</label></td>
                <td><input type="text" id="Sl" placeholder="enter Salary details" required></td>
            </tr>
            <tr align="center">
	            <td colspan="5"> <input type="submit" value="Register"></td>
            </tr>
        </table>
    </form>
</body>
</html>
