<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <div class="container-fluid">

        <div class="row">
            <div class="col text-center fs-1">Student Registration</div>
        </div>

        <div class="row mb-3 mt-4">
            <div class="col-5 text-end fs-4">
                <label for="exampleInputEmail1" class="form-label">Full Name</label>
            </div>
            <div class="col-3">
                <input type="text" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp">
            </div>
        </div>

        <div class="row mb-3 mt-4">
            <div class="col-5 text-end fs-4">
                <label for="exampleInputEmail1" class="form-label">E-mail</label>
            </div>
            <div class="col-3">
                <input type="email" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp">
            </div>
        </div>

        <div class="row mb-3 mt-4">
            <div class="col-5 text-end fs-4">
                <label for="exampleInputEmail1" class="form-label">Mobile Number</label>
            </div>
            <div class="col-3">
                <input type="number" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp">
            </div>
        </div>

        <div class="row mb-3 mt-4">
            <div class="col-5 text-end fs-4">
                <label for="exampleInputEmail1" class="form-label">Address</label>
            </div>
            <div class="col-3">
                <textarea class="form-control" id="exampleFormControlTextarea1" rows="3"></textarea>
            </div>
        </div>

        <div class="row mb-3 mt-4">
            <div class="col-5 text-end fs-4">
                <label for="exampleInputEmail1" class="form-label">Nationality</label>
            </div>
            <div class="col-3">
                <input type="text" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp">
            </div>
        </div>

        <div class="row mb-3 mt-4">
            <div class="col-5 text-end fs-4">
                <label for="exampleInputEmail1" class="form-label">Date of Birth</label>
            </div>
            <div class="col-3">
                <input type="date" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp">
            </div>
        </div>



        <div class="row mb-3 mt-4">
            <div class="col-5 text-end fs-4">
                <label for="exampleInputEmail1" class="form-label">Gender</label>
            </div>
            <div class="col-1">
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="radioDefault" id="radioDefault2" checked>
                    <label class="form-check-label" for="radioDefault2">
                        Male
                    </label>
                </div>
            </div>
            <div class="col-2">

                <div class="form-check">
                    <input class="form-check-input" type="radio" name="radioDefault" id="radioDefault1">
                    <label class="form-check-label" for="radioDefault1">
                        Female
                    </label>
                </div>
            </div>
            
        </div>







        <div class="row mb-3 mt-4">
            <div class="col-5 text-end fs-4">
                <label for="exampleInputEmail1" class="form-label">Highest Degree</label>
            </div>
            <div class="col-3">
                <select class="form-select" aria-label="Default select example">
                    <option selected>Select Degree</option>
                    <option value="1">One</option>
                    <option value="2">Two</option>
                    <option value="3">Three</option>
                </select>
            </div>
        </div>

        <div class="row mb-3 mt-4">
            <div class="col-5 text-end fs-4">
                <label for="exampleInputEmail1" class="form-label">CPI</label>
            </div>
            <div class="col-3">
                <input type="text" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp">
            </div>
        </div>

        <div class="row mb-3 mt-4">
            <div class="col-5 text-end fs-4">
                <label for="exampleInputEmail1" class="form-label">University </label>
            </div>
            <div class="col-3">
                <input type="text" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp">
            </div>
        </div>

        <div class="row mb-3 mt-4">
            <div class="col-5 text-end fs-4">
                <label for="exampleInputEmail1" class="form-label">Passing year</label>
            </div>
            <div class="col-3">
                <select class="form-select" aria-label="Default select example">
                    <option selected>Select your passing year</option>
                    <option value="1">One</option>
                    <option value="2">Two</option>
                    <option value="3">Three</option>
                </select>
            </div>
        </div>

        <div class="row mb-3 mt-4">
            <div class="col-6 text-end fs-4">
                <button type="submit" class="btn btn-secondary">Submit</button>
            </div>
            <div class="col-2 ">
                <button type="reset" class="btn btn-secondary">Cancel</button>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
