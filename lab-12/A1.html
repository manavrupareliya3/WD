<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .manav{
        background-image: url(2.jpg);
        height: 100px;
        width: 100px;
        border: 1px solid black;    
        border-bottom-left-radius: 40px;
        border-top-right-radius: 40px;    
    }
    .animation{
        background-color: rgb(185, 73, 45);
        height: 150px;
        width: 150px;
        border: 1px solid black;
        border-bottom-left-radius: 40px;
        border-top-right-radius: 40px;
        animation-name: abc;
        animation-timing-function: ease-in-out;
        animation-duration: 5s;
        animation-delay: 2s;
        animation-iteration-count: infinite;
        animation-direction: reverse;
    }
    @keyframes abc{
        from{
            background-color: rgb(218, 67, 67);
        }
        to{
            background-color: rgb(202, 84, 173);
        }
        0%{
            margin-top: 0px;
            margin-left: 0px;
        }
        25%{
            margin-top: 0px;
            margin-left: 1000px;
        }
        50%{
            margin-top: 400px;
            margin-left: 1000px;
        }
        75%{
            margin-top: 400px;
            margin-left: 0px;
        }
        100%{
            margin-top: 0px;
            margin-left: 0px;
        }
    }
</style>
<body>
    <div class="animation">
        <div class="manav"></div>
    </div>
</body>
</html>
