    .red{
        background-color: red;

    .first{

        animation-name: manav2;

        animation-iteration-count: infinite;
        animation-direction: normal;
    }
    @media screen and (max-width:1300px) {
        .red{
            background-color: brown;
            color: blue;

            animation-iteration-count: infinite;
            animation-direction: normal;
        }
    }
    @keyframes manav{
        0%{
            background-color: brown;
            color: blue;
        }
        25%{
            background-color: chocolate;
            color: red;
        }
        50%{
            background-color: rgb(160, 233, 64);
            color: red;
        }
        75%{
            background-color: rgb(82, 216, 55);
            color: red;
        }
        100%{
            background-color: rgb(63, 145, 221);
            color: red;
        }
    }
    
    @media screen and(min-width:400px) {
