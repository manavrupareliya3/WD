<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .first{
        background-color: black;
        float: right;
        color: white; 
        height: 40vh; 
        width: 40%; 
        margin: 10px;
    }
    @media screen and (max-width:1000px) {
        .first{
            background-color: brown;
            color: blue;
            animation-name: manav;
            animation-duration: 5s;
            animation-timing-function: ease-in-out;
            animation-delay: 2s;
            animation-iteration-count: infinite;
            animation-direction: normal;
        }
    }
    @keyframes manav{
        0%{
            background-color: brown;
            color: blue;
        }
        25%{
            background-color: chocolate;
            color: red;
        }
        50%{
            background-color: rgb(160, 233, 64);
            color: red;
        }
        75%{
            background-color: rgb(82, 216, 55);
            color: red;
        }
        100%{
            background-color: rgb(63, 145, 221);
            color: red;
        }
    }
</style>
<body>
    <div style="background-color: cyan; height: 90vh;  padding: 0.5%;" >

        </div>

    </div>
</body>
</html>
